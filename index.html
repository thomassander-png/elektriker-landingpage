<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Elektriker Jobs</title>

</head>

<body style="font-family:Arial;padding:40px">

<h1 id="title"></h1>

<p id="text"></p>

<a href="/#bewerbung">Jetzt in 60 Sekunden bewerben</a>

<script>

const params = new URLSearchParams(window.location.search);
const city = params.get("city");

const cityName = city
.replace(/-/g," ")
.replace(/\b\w/g,l=>l.toUpperCase());

document.getElementById("title").innerText =
"Elektriker Jobs in " + cityName;

document.getElementById("text").innerText =
"Viele Elektrobetriebe und Industrieunternehmen suchen aktuell Elektriker in " + cityName + ". Bewirb dich jetzt in weniger als 60 Sekunden.";

</script>

</body>
</html>
